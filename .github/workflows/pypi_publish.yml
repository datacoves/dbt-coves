name: Publish new PyPi build version

on:
  workflow_dispatch:
    inputs:
      bumpType:
        description: Bump type
        required: true
        default: patch
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  publish:
    name: PyPi Publishing
    runs-on: ubuntu-latest
    env:
      UV_PUBLISH_USERNAME: ${{ secrets.POETRY_HTTP_BASIC_USERNAME }}
      UV_PUBLISH_PASSWORD: ${{ secrets.POETRY_HTTP_BASIC_PASSWORD }}

    steps:
      - name: Checkout branch
        uses: actions/checkout@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.9.x"
          python-version: "3.11"

      - name: Install Dependencies using uv
        run: uv sync

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Release new PyPi build version
        env:
          BUMP_TYPE: ${{ inputs.bumpType }}
        run: "/home/runner/work/dbt-coves/dbt-coves/publish.sh $BUMP_TYPE"
